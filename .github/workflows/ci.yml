name: CI

on:
  pull_request:
    branches:
      - next-release # runs on PRs targeting next-release
      - main # runs on PRs targeting main
  workflow_dispatch: # Optional: Allow manual trigger

permissions:
  contents: read # Allows actions/checkout to read the repository
  pull-requests: read # Required to read PR metadata (e.g., PR title, author)

jobs:
  lint-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linter
        run: yarn lint

      - name: Run tests with coverage
        run: yarn test:coverage

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v6
        with:
          ignoreLabels: |
            bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: macos-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install example dependencies
        run: |
          cd example
          yarn install --frozen-lockfile

      - name: Build Android
        run: |
          cd example
          yarn clean:android
          cd android
          ./gradlew assembleDebug

  build-ios:
    runs-on: macos-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install example dependencies
        run: |
          cd example
          yarn install --frozen-lockfile

      - name: Build iOS
        run: |
          cd example
          yarn clean:ios
