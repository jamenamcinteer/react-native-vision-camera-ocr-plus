name: Validate Expo/React Native Versions

on:
  push:
    branches:
      - next-release # runs on direct pushes to next-release
  pull_request:
    branches:
      - main # runs on PRs targeting main
  workflow_dispatch: # Optional: Allow manual trigger

permissions:
  contents: read # Allows actions/checkout to read the repository
  pull-requests: read # Required to read PR metadata (e.g., PR title, author)

jobs:
  build-android-latest:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install example dependencies
        run: |
          cd example
          yarn install --frozen-lockfile

      - name: Build Android - Latest
        run: |
          cd example
          yarn clean:android
          cd android
          ./gradlew assembleRelease

  build-ios-latest:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install example dependencies
        run: |
          cd example
          yarn install --frozen-lockfile

      - name: Build iOS - Latest
        run: |
          cd example
          yarn clean:ios

  build-android-expo-54:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install example dependencies
        run: |
          cd example
          yarn install --frozen-lockfile

      - name: Build Android - Expo 54
        run: |
          cd example
          yarn use:expo-54
          yarn clean:android
          cd android
          ./gradlew assembleRelease

  build-ios-expo-54:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install example dependencies
        run: |
          cd example
          yarn install --frozen-lockfile

      - name: Build iOS - Expo 54
        run: |
          cd example
          yarn use:expo-54
          yarn clean:ios

  build-android-next:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install example dependencies
        run: |
          cd example
          yarn install --frozen-lockfile

      - name: Build Android - Next (Canary)
        run: |
          cd example
          yarn use:next
          yarn clean:android
          cd android
          ./gradlew assembleRelease

  build-ios-next:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install example dependencies
        run: |
          cd example
          yarn install --frozen-lockfile

      - name: Build iOS - Next (Canary)
        run: |
          cd example
          yarn use:next
          yarn clean:ios
